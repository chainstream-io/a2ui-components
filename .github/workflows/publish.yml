name: Publish to npm

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - run: pnpm install --frozen-lockfile

      - name: Set version from git tag
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="0.0.0-dev.$(date +%s)"
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          cd packages/catalog && pnpm version "$VERSION" --no-git-tag-version --allow-same-version
          cd ../react && pnpm version "$VERSION" --no-git-tag-version --allow-same-version

      - run: pnpm build

      - name: Publish catalog
        run: pnpm --filter @chainstream-io/a2ui-catalog publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish react
        run: pnpm --filter @chainstream-io/a2ui-react publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
